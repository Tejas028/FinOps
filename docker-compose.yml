version: "3.9"
services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: finops_timescaledb
    environment:
      POSTGRES_DB: finops
      POSTGRES_USER: finops_user
      POSTGRES_PASSWORD: finops_pass
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./storage/init_db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finops_user -d finops"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: ./api/Dockerfile
    container_name: finops_api
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      - DB_HOST=timescaledb
      - DB_PORT=5432
      - DB_USER=finops_user
      - DB_PASSWORD=finops_pass
      - DB_NAME=finops
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finops_frontend
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app

volumes:
  timescale_data:
