version: "3.9"
services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: finops_timescaledb
    environment:
      POSTGRES_DB: finops
      POSTGRES_USER: finops_user
      POSTGRES_PASSWORD: finops_pass
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./storage/init_db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finops_user -d finops"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  timescale_data:
